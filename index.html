<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deal Intelligence - Peterson Search Partners</title>
<script src="https://unpkg.com/@azure/msal-browser@3.10.0/lib/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f0e;--surface:#141716;--border:#232826;--accent:#c8f04a;--accent-dim:rgba(200,240,74,0.12);--text:#e8ede9;--muted:#5a6b5d;--user-bg:#1a2e1c;--ai-bg:#141716}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:15px;color:#0d0f0e;font-weight:900}
.header-title{font-family:'DM Serif Display',serif;font-size:17px}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.status-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);background:var(--border);padding:5px 10px;border-radius:20px;font-family:'DM Mono',monospace}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:background 0.3s}
.status-dot.connected{background:var(--accent)}
.files-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:8px;flex-shrink:0;overflow-x:auto;min-height:48px}
.files-label{font-size:11px;color:var(--muted);margin-right:4px;white-space:nowrap}
.file-chip{display:flex;align-items:center;gap:6px;background:var(--accent-dim);border:1px solid rgba(200,240,74,0.2);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--accent);white-space:nowrap;font-family:'DM Mono',monospace}
.chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.message{display:flex;gap:12px;max-width:820px}
.message.user{flex-direction:row-reverse;align-self:flex-end}
.avatar{width:28px;height:28px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600}
.avatar.ai{background:var(--accent);color:#0d0f0e}
.avatar.user{background:#2a3f2c;color:var(--accent)}
.bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.65;max-width:680px}
.message.ai .bubble{background:var(--ai-bg);border:1px solid var(--border);border-top-left-radius:4px}
.message.user .bubble{background:var(--user-bg);border:1px solid rgba(200,240,74,0.15);border-top-right-radius:4px}
.bubble strong{color:var(--accent);font-weight:600}
.thinking{display:flex;gap:4px;align-items:center;padding:4px 0}
.thinking span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.2s infinite ease-in-out}
.thinking span:nth-child(2){animation-delay:0.15s}
.thinking span:nth-child(3){animation-delay:0.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4}40%{transform:translateY(-5px);opacity:1}}
.input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 14px}
#userInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;resize:none;line-height:1.5;max-height:120px}
#userInput::placeholder{color:var(--muted)}
#sendBtn{width:32px;height:32px;border-radius:8px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#sendBtn:disabled{opacity:0.3;cursor:not-allowed}
.suggestions{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.suggestion{font-size:12px;color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;background:none;font-family:'DM Sans',sans-serif}
.suggestion:hover{border-color:var(--accent);color:var(--accent)}
.login-screen{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;text-align:center;padding:40px}
.login-icon{width:64px;height:64px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:28px;color:#0d0f0e}
.login-title{font-family:'DM Serif Display',serif;font-size:26px}
.login-sub{font-size:14px;color:var(--muted);max-width:360px;line-height:1.6}
.login-btn{background:var(--accent);color:#0d0f0e;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:8px}
.powered-by{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:4px}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">DI</div>
    <div>
      <div class="header-title">Deal Intelligence</div>
      <div class="header-sub">SharePoint + Claude &mdash; Peterson Search Partners</div>
    </div>
  </div>
  <div class="status-badge">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Not connected</span>
  </div>
</header>
<div class="files-bar" id="filesBar">
  <span class="files-label">CONNECTED FILES</span>
  <span style="font-size:12px;color:var(--muted)" id="filesPlaceholder">Sign in to load SharePoint documents</span>
</div>
<div id="loginScreen" class="login-screen">
  <div class="login-icon">DI</div>
  <div class="login-title">Deal Intelligence</div>
  <div class="login-sub">Connect your Microsoft account to let Claude reason over your SharePoint deal documents in real time.</div>
  <button class="login-btn" onclick="signIn()">
    <svg width="16" height="16" viewBox="0 0 23 23" fill="currentColor"><path d="M0 0h11v11H0zm12 0h11v11H12zM0 12h11v11H0zm12 0h11v11H12z"/></svg>
    Sign in with Microsoft
  </button>
  <div class="powered-by">Powered by Microsoft Graph API + Claude</div>
</div>
<div id="chatScreen" style="display:none;flex:1;flex-direction:column;overflow:hidden">
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <div class="suggestions" id="suggestions">
      <button class="suggestion" onclick="useSuggestion(this)">What deals have we passed on and why?</button>
      <button class="suggestion" onclick="useSuggestion(this)">Which deal has the best EBITDA margin?</button>
      <button class="suggestion" onclick="useSuggestion(this)">Summarize all three deals</button>
      <button class="suggestion" onclick="useSuggestion(this)">Which deal moved to LOI?</button>
    </div>
    <div class="input-row">
      <textarea id="userInput" rows="1" placeholder="Ask Claude anything about your deal documents..."></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="#0d0f0e"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </div>
</div>
<script>
const CLIENT_ID = 'afd5d8bb-fc00-4e20-9e85-46ef19292e8a';
const TENANT_ID = 'abe1addb-8125-4bf9-8490-bb72fba58790';
const msalConfig = {auth:{clientId:CLIENT_ID,authority:"https://login.microsoftonline.com/"+TENANT_ID,redirectUri:window.location.origin},cache:{cacheLocation:"sessionStorage"}};
let msalInstance = null;
let accessToken = null, docsContext = "", chatHistory = [];
async function signIn(){try{if(typeof msal==="undefined"){alert("Auth library not loaded. Please refresh.");return;}msalInstance = new msal.PublicClientApplication(msalConfig);await msalInstance.initialize();const result=await msalInstance.loginPopup({scopes:["Sites.Read.All","Files.Read.All","User.Read"]});accessToken=result.accessToken;await loadSharePointFiles();showChatScreen();}catch(e){alert("Sign in failed: "+e.message);}}
async function loadSharePointFiles(){try{const siteRes=await fetch("https://graph.microsoft.com/v1.0/sites/netorg17905377.sharepoint.com:/sites/DealMemos",{headers:{Authorization:"Bearer "+accessToken}});const site=await siteRes.json();const filesRes=await fetch("https://graph.microsoft.com/v1.0/sites/"+site.id+"/drive/root/children",{headers:{Authorization:"Bearer "+accessToken}});const filesData=await filesRes.json();const files=filesData.value.filter(f=>f.name.endsWith(".docx"));const bar=document.getElementById("filesBar");document.getElementById("filesPlaceholder").remove();files.forEach(f=>{const chip=document.createElement("div");chip.className="file-chip";chip.textContent=f.name.replace(".docx","");bar.appendChild(chip);});document.getElementById("statusText").textContent="Loading documents...";let allText="";for(const file of files){const r=await fetch("https://graph.microsoft.com/v1.0/sites/"+site.id+"/drive/items/"+file.id+"/content",{headers:{Authorization:"Bearer "+accessToken}});const blob=await r.blob();const text=await extractText(blob,file.name);allText+="\n\n=== "+file.name+" ===\n"+text;}docsContext=allText;document.getElementById("statusDot").classList.add("connected");document.getElementById("statusText").textContent=files.length+" files loaded";}catch(e){document.getElementById("statusText").textContent="Error: "+e.message;}}
async function extractText(blob,name){try{const buf=await blob.arrayBuffer();const raw=new TextDecoder("utf-8").decode(new Uint8Array(buf));const matches=raw.match(/[\x20-\x7E\t]{4,}/g)||[];return matches.filter(s=>s.trim().length>3&&!s.includes("<?xml")&&!s.includes("xmlns")).join(" ").replace(/\s+/g," ").trim()||"[Content from "+name+"]";}catch(e){return "[Could not extract "+name+"]";}}
function showChatScreen(){document.getElementById("loginScreen").style.display="none";const chat=document.getElementById("chatScreen");chat.style.display="flex";chat.style.flexDirection="column";chat.style.flex="1";addMessage("ai","Connected to your SharePoint deal library. Loaded <strong>"+document.querySelectorAll(".file-chip").length+" deal memos</strong>. What would you like to know?");}
function useSuggestion(btn){document.getElementById("userInput").value=btn.textContent;document.getElementById("suggestions").style.display="none";sendMessage();}
async function sendMessage(){const input=document.getElementById("userInput");const text=input.value.trim();if(!text)return;input.value="";input.style.height="auto";document.getElementById("suggestions").style.display="none";document.getElementById("sendBtn").disabled=true;addMessage("user",text);const tid=addThinking();chatHistory.push({role:"user",content:text});try{const sys="You are Deal Intelligence for Peterson Search Partners. Answer based only on deal memos. Be concise.\n\nDEAL DOCUMENTS:\n"+docsContext;const res=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:chatHistory})});const data=await res.json();const reply=data.content&&data.content[0]?data.content[0].text:"No response.";removeThinking(tid);chatHistory.push({role:"assistant",content:reply});addMessage("ai",reply.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\n/g,"<br>"));}catch(e){removeThinking(tid);addMessage("ai","Error: "+e.message);}document.getElementById("sendBtn").disabled=false;}
function addMessage(role,html){const area=document.getElementById("chatArea");const msg=document.createElement("div");msg.className="message "+role;msg.innerHTML="<div class=\"avatar "+role+"\">"+(role==="ai"?"AI":"SB")+"</div><div class=\"bubble\">"+html+"</div>";area.appendChild(msg);area.scrollTop=area.scrollHeight;}
function addThinking(){const area=document.getElementById("chatArea");const id="t"+Date.now();const msg=document.createElement("div");msg.className="message ai";msg.id=id;msg.innerHTML="<div class=\"avatar ai\">AI</div><div class=\"bubble\"><div class=\"thinking\"><span></span><span></span><span></span></div></div>";area.appendChild(msg);area.scrollTop=area.scrollHeight;return id;}
function removeThinking(id){const el=document.getElementById(id);if(el)el.remove();}
document.addEventListener("DOMContentLoaded",()=>{const input=document.getElementById("userInput");input.addEventListener("input",()=>{input.style.height="auto";input.style.height=Math.min(input.scrollHeight,120)+"px";});input.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();}});});
</script>
</body>
</html>
